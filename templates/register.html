<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Inscription</title>

  <link rel="stylesheet" href="{{ url_for('static', filename='css/login_register.css') }}" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
</head>
<body>

  <div class="background">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
  </div>

  <main class="card">

    <div class="card__header">
      <div class="logo">
        <span class="logo__dot"></span>
        <span class="logo__name">GenFlix</span>
      </div>
      <h1 class="card__title">Bienvenue.</h1>
      <p class="card__subtitle">Inscrivez-vous pour continuer.</p>
    </div>

    <form id="registerForm" class="form" action="#" method="POST" novalidate>

        <div class="form__group">
        <label class="form__label" for="pseudo">Pseudo</label>
        <input
          class="form__input"
          type="text"
          id="pseudo"
          name="pseudo"
          placeholder="Votre pseudo"
          autocomplete="username"
          required
        />
      </div>


      <div class="form__group">
        <label class="form__label" for="email">Adresse e-mail</label>
        <input
          class="form__input"
          type="email"
          id="email"
          name="email"
          placeholder="vous@exemple.com"
          autocomplete="email"
          required
        />
      </div>

      <div class="form__group">
        <label class="form__label" for="password">Mot de passe</label>
        <input
          class="form__input"
          type="password"
          id="password"
          name="password"
          placeholder="••••••••"
          autocomplete="current-password"
          required
        />
      </div>

      <button id="btnRegister" class="btn" type="submit">
        <span>Créer son compte</span>
      </button>

    </form>

    <p class="card__footer">
      Déja inscrit ? <a class="form__link" href="{{ url_for('auth.login') }}">Se connecter</a>
    </p>

  </main>

  <script src="{{ url_for('static', filename='js/register.js') }}"></script>
</body>
</html>
