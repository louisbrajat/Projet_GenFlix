<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Connexion</title>
  <link rel="stylesheet" href="../static/css/login.css" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
</head>
<body>

  <div class="background">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
  </div>

  <main class="card">

    <div class="card__header">
      <div class="logo">
        <span class="logo__dot"></span>
        <span class="logo__name">Portail</span>
      </div>
      <h1 class="card__title">Bienvenue.</h1>
      <p class="card__subtitle">Connectez-vous à votre espace.</p>
    </div>

    <form class="form" action="#" method="POST" novalidate>

      <div class="form__group">
        <label class="form__label" for="email">Adresse e-mail</label>
        <input
          class="form__input"
          type="email"
          id="email"
          name="email"
          placeholder="vous@exemple.com"
          autocomplete="email"
          required
        />
      </div>

      <div class="form__group">
        <label class="form__label" for="password">Mot de passe</label>
        <input
          class="form__input"
          type="password"
          id="password"
          name="password"
          placeholder="••••••••"
          autocomplete="current-password"
          required
        />
      </div>

      <button class="btn" type="submit">
        <span>Se connecter</span>
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="5" y1="12" x2="19" y2="12"/>
          <polyline points="12 5 19 12 12 19"/>
        </svg>
      </button>

    </form>

    <p class="card__footer">
      Pas encore de compte ? <a class="form__link" href="#">Créer un compte</a>
    </p>

  </main>


</body>
</html>
