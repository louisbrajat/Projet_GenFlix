<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Page Bouton</title>
  <link rel="stylesheet" href="../static/css/style_etoile_test.css" />
</head>
<body>

  <div style="display:flex; flex-direction:column; align-items:center; gap:12px;">

    <div class="card-wrapper">
      <div class="card" id="card">

        <!-- Face avant : bouton classique -->
        <div class="face face-front">
          <button class="btn" id="mainBtn">Cliquez ici</button>
        </div>

        <!-- Face arrière : notation étoiles -->
        <div class="face face-back">
          <div class="stars" id="stars">
            <span class="star" data-value="1">★</span>
            <span class="star" data-value="2">★</span>
            <span class="star" data-value="3">★</span>
            <span class="star" data-value="4">★</span>
            <span class="star" data-value="5">★</span>
          </div>
          <span class="note-label" id="noteLabel">Donnez une note</span>
          <button class="reset-btn" id="resetBtn">← retour</button>
        </div>

      </div>
    </div>

    <span class="status" id="status"></span>
  </div>

  <script src="../static/js/test_notation_étoiles.js"></script>
</body>
</html>
