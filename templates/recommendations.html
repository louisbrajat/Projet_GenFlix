{% extends "base.html" %}
{% block content %}

<link rel="stylesheet" href="{{ url_for('static', filename='css/mesSeries.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='css/recommendations.css') }}">
<script src="{{ url_for('static', filename='js/recommendations.js') }}" defer></script>

<div class="reco-wrapper">

    <div class="MesSeries" id="MesSeries">
        <h3>Mes dernières séries</h3>
        <div class="listeSerie" id="last-series-list">
            {% for s in user.serie %}
            <div class="film serie-item" data-title="{{ s.name }}">
                <div class="contenant">
                    <div class="affiche">
                        <img class="img_film" src="{{ s.img }}">
                    </div>
                    <div class="titreFilm">
                        <p>{{ s.name }}</p>
                    </div>
                    <div class="bottomFilm">
                        <button class="butAjout" type="button">Déjà ajoutée</button>
                    </div>
                </div>
                <div class="notation">
                    <span class="star">★</span>
                    <span class="star">★</span>
                    <span class="star">★</span>
                    <span class="star">★</span>
                    <span class="star">★</span>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>

    <div class="reco-panel">
        <h3>Recommandations Gemini</h3>
        <p class="subtitle">
            Génère des suggestions à partir de tes séries déjà enregistrées.
        </p>

        <label for="prompt-input" class="prompt-label">Prompt Gemini</label>
        <textarea id="prompt-input" rows="7">
Je veux des recommandations cohérentes avec mes séries préférées.
Réponds en français.
Propose 5 séries maximum.
Pour chaque suggestion, donne :
- le nom de la série
- le genre principal
- une explication courte et claire.
        </textarea>

        <div class="actions">
            <button id="gemini-btn" type="button">Générer mes suggestions</button>
        </div>

        <div id="loading" class="loading hidden">Génération en cours...</div>

        <div id="gemini-result" class="gemini-result hidden">
            <h3>Suggestions Gemini</h3>
            <div id="gemini-text"></div>
        </div>
    </div>

</div>

{% endblock %}
