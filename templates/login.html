<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Connexion</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/login_register.css') }}" />
</head>
<body>

  <div class="background">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
  </div>

  <main class="card">

    <div class="card__header">
      <div class="logo">
        <h1 class="logo__name">GenFlix<strong>.</strong></h1>
      </div>
      <p class="card__subtitle">Connectez-vous à votre espace.</p>
    </div>

    <form id = "formLogin" class="form" action="#" method="POST" novalidate>

      <div class="form__group">
        <label class="form__label" for="email">Adresse e-mail</label>
        <input
          class="form__input"
          type="email"
          id="email"
          name="email"
          placeholder="vous@exemple.com"
          autocomplete="email"
          required
        />
      </div>

      <div class="form__group">
        <label class="form__label" for="password">Mot de passe</label>
        <input
          class="form__input"
          type="password"
          id="password"
          name="password"
          placeholder="••••••••"
          autocomplete="current-password"
          required
        />
      </div>
        
        <button id="btnLogin" class="btnDeco" type="submit">
        <span>Se connecter</span>
      </button>
    </form>

    <p class="card__footer">
      Pas encore de compte ? <a class="form__link" href="{{ url_for('auth.register') }}">Créer un compte</a>
    </p>

  </main>
  <script src="{{ url_for('static', filename='js/login.js') }}"></script>
</body>
</html>
